- type: entity
  id: PartHarpy
  parent: [BaseItem, BasePart] # DS14-Soyuz: add BasePart, consistency with upstream
  name: "harpy body part"
  abstract: true
  components:
  # DS14-Soyuz: commented out lines below, inherited from BasePart
  # - type: Damageable
  #   damageContainer: Biological
  # - type: BodyPart
  # - type: ContainerContainer
  #   containers:
  #     bodypart: !type:Container
  #       ents: []
  # - type: StaticPrice #DynamicPrice
  #   price: 100
  # - type: Tag
  #   tags:
  #     - Trash
  # End DS14-Soyuz: inherited from BasePart
  # DS14-Soyuz: added lines below, consistency with upstream
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10
  # End DS14-Soyuz: consistency with upstream

- type: entity
  id: TorsoHarpy
  name: "harpy torso"
  parent: [PartHarpy, BaseTorso] # DS14-Soyuz: add BaseTorso
  components:
