# From Resources\Prototypes\_Lua\Actions\types.yml
- type: entity
  id: ActionAriralLayEgg
  name: Отложить яйцо
  description: Это должно быть очень важно для вас
  components:
  - type: LimitedCharges
    maxCharges: 1
  - type: Action
    icon: { sprite: Objects/Consumable/Food/egg.rsi, state: icon }
  - type: InstantAction
    event: !type:EggAriralLayInstantActionEvent
- type: entity
  parent: FoodEgg
  id: FoodAriralEggLaid
  name: cтранное яйцо
  description: Вам вероятно не захочется пробовать это
  components:
  - type: Sprite
    scale: 1.3, 1.4
    sprite: Objects/Consumable/Food/egg.rsi
  - type: BadFood
  - type: Item
    size: Small
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 12
        reagents:
        - ReagentId: Egg
          Quantity: 6
        - ReagentId: AriralBlood
          Quantity: 6

