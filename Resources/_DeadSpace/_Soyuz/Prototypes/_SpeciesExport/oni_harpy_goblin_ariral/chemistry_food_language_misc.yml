# From Resources\Prototypes\_NF\Reagents\biological.yml
- type: reagent
  parent: Blood
  id: GoblinBlood
  name: reagent-name-goblin-blood
  group: Biological
  desc: reagent-desc-goblin-blood
  flavor: bitter
  color: "#364500"
  recognizable: true
  physicalDesc: reagent-physical-desc-pungent
  footstepSound:
    collection: FootstepBlood
    params:
      volume: 6
  metabolisms:
    Drink:
      effects:
      # Effects for non-goblins
      - !type:SatiateThirst
        factor: -0.5
        conditions:
        - !type:OrganType
          type: Goblin
          shouldHave: false
      - !type:ChemVomit
        probability: 0.025
        conditions:
        - !type:OrganType
          type: Goblin
          shouldHave: false
      - !type:GenericStatusEffect
        key: Stutter
        component: GoblinAccent
        probability: 0.025
        type: Add
        time: 30
        refresh: true
        conditions:
        - !type:OrganType
          type: Goblin
          shouldHave: false
      # Effects for goblins
      - !type:SatiateThirst
        factor: 1
        conditions:
        - !type:OrganType
          type: Goblin
          shouldHave: true

# From Resources\Prototypes\_ShibaStation\Reagents\biological.yml
- type: reagent
  id: AriralBlood
  name: reagent-name-ariral-blood
  group: Biological
  desc: reagent-desc-ariral-blood
  flavor: metallic
  color: "#d82000"
  metamorphicMaxFillLevels: 5
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: true
  recognizable: true
  physicalDesc: reagent-physical-desc-ferrous
  slipData:
    requiredSlipSpeed: 4.0
  friction: 0.4
  metabolisms:
    Poison:
      effects:
      # Lua start
      - !type:AdjustReagent
        conditions:
        - !type:OrganType
          type: Ariral
          shouldHave: true
        reagent: AriralBlood
        amount: -2
        # Lua end
      - !type:ChemVomit
        conditions:
        - !type:OrganType
          type: Ariral
          shouldHave: false
        - !type:ReagentThreshold
          min: 5
        probability: 0.1
      - !type:GenericStatusEffect
        conditions:
        - !type:OrganType
          type: Ariral
          shouldHave: false
        - !type:ReagentThreshold
          min: 2
        key: SeeingRainbows
        component: SeeingRainbows
        type: Add
        time: 8
        refresh: true
      - !type:PopupMessage
        conditions:
        - !type:OrganType
          type: Ariral
          shouldHave: false
        - !type:ReagentThreshold
          min: 2
        type: Local
        visualType: Medium
        messages: ["generic-reagent-effect-nauseous", "generic-reagent-effect-dizzy"]
        probability: 0.5
      - !type:HealthChange
        conditions:
        - !type:OrganType
          type: Ariral
          shouldHave: false
        - !type:ReagentThreshold
          min: 1
        damage:
          types:
            Poison: 1.25
  footstepSound:
    collection: FootstepBlood
    params:
      volume: 6
- type: reagent
  id: AriralSweat
  name: reagent-name-ariral-sweat
  group: Biological
  desc: reagent-desc-ariral-sweat
  flavor: metallic
  color: "#e0e0e0"
  metamorphicMaxFillLevels: 5
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: true
  recognizable: false
  physicalDesc: reagent-physical-desc-volatile
  slipData:
    requiredSlipSpeed: 4.0
  friction: 0.4
  metabolisms:
    Poison:
      effects:
      - !type:ChemVomit
        conditions:
        - !type:OrganType
          type: Ariral
          shouldHave: false
        - !type:ReagentThreshold
          min: 5
        probability: 0.1
      - !type:GenericStatusEffect
        conditions:
        - !type:OrganType
          type: Ariral
          shouldHave: false
        - !type:ReagentThreshold
          min: 2
        key: SeeingRainbows
        component: SeeingRainbows
        type: Add
        time: 6
        refresh: true
      - !type:PopupMessage
        conditions:
        - !type:OrganType
          type: Ariral
          shouldHave: false
        - !type:ReagentThreshold
          min: 2
        type: Local
        visualType: Medium
        messages: ["generic-reagent-effect-nauseous", "generic-reagent-effect-dizzy"]
        probability: 0.5
      - !type:HealthChange
        conditions:
        - !type:OrganType
          type: Ariral
          shouldHave: false
        - !type:ReagentThreshold
          min: 1
        damage:
          types:
            Poison: 0.75

