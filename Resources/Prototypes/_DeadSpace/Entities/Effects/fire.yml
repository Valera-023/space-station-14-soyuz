- type: entity
  name: огонь
  suffix: Не пропадает
  placement:
    mode: SnapgridCenter
    snap:
      - Wall
  description: Горячо!
  id: FireNRFBase
  components:
  - type: Physics
  - type: Sprite
    layers:
    - sprite: _DeadSpace/Effects/fire.rsi
      state: fire
      shader: unshaded
      map: [ "unshaded" ]
  - type: Fixtures
    fixtures:
      fix1:
        hard: false
        density: 7
        shape:
          !type:PhysShapeAabb
           bounds: "-0.5,-0.5,0.5,0.5"
        layer:
        - MidImpassable
  - type: Temperature
  - type: Barotrauma
    damage:
      types:
        Blunt: 5
  - type: AtmosExposed
  - type: PointLight
    enabled: true
    color: "#FF8C00"
    radius: 2.0
    energy: 2.0
  - type: Projectile
    deleteOnCollide: false
    damage:
      types:
        Heat: 5
    soundHit:
      path: "/Audio/Weapons/Guns/Hits/energy_meat1.ogg"
  - type: IgniteOnCollide
    fireStacks: 0.6
    count: 90
    fixtureId: fix1
  - type: Transform
    anchored: true
  - type: IgnitionSource
    temperature: 600
    ignited: true
  - type: Damageable
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 45
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Reactive
    groups:
      Flammable: [Touch]
      Extinguish: [Touch]
    reactions:
    - reagents: [Water]
      methods: [Touch]
      effects:
      - !type:HealthChange
        damage:
          types:
            Heat: 5
  - type: DamageContacts
    damage:
      types:
        Heat: 10

- type: entity
  name: огонь
  description: Очень горячо!
  id: FireNRFHELL
  parent: FireNRFBase
  suffix: Адский
  components:
  - type: EdgeSpreader
    id: Kudzu
  - type: ActiveEdgeSpreader
  - type: PointLight
    enabled: true
    color: "#FF8C00"
    radius: 2.0
    energy: 2.0
  - type: Kudzu
    growthTickChance: 1.0
    spreadChance: 1.0
  - type: GrowingKudzu