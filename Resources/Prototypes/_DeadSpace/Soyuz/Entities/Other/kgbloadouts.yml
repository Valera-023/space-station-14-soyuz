- type: entity
  id: KGBloadoutPrimary
  name: кейс неопределённости
  description: Прочный военный кейс для оружия. Принадлежит оперативнику КГБ.
  suffix: КГБ, Основное
  parent: BaseERTloadoutPrimary
  components:
  - type: Sprite
    state: kgb
  - type: ThiefUndeterminedBackpack
    possibleSets:
    - DrozdSetOKGB
    - SaigaSet
  - type: ActivatableUI
    key: enum.ThiefBackpackUIKey.Key
  - type: UserInterface
    interfaces:
      enum.ThiefBackpackUIKey.Key:
        type: ThiefBackpackBoundUserInterface

- type: entity
  id: KGBloadoutSecondary
  name: коробка неопределённости
  description: Коробка с гипоспреем. Принадлежит оперативнику КГБ.
  suffix: КГБ, Вторичное
  parent: BaseERTloadoutSecondary
  components:
  - type: Sprite
    state: kgb
  - type: Item
    size: Small
    shape:
    - 0,0,0,1
  - type: ThiefUndeterminedBackpack
    possibleSets:
    - CombatHypoSet
    - CombatHypoStingSet
  - type: ActivatableUI
    key: enum.ThiefBackpackUIKey.Key
  - type: UserInterface
    interfaces:
      enum.ThiefBackpackUIKey.Key:
        type: ThiefBackpackBoundUserInterface

