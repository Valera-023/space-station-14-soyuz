# Hypo
- type: entity
  name: Тактический гипоспрей Мед-Техника "Жало"
  parent: BaseItem
  description: Особая разработка для лечения в особых задачах.
  categories: [ HideSpawnMenu ]
  id: Hyposprayhent
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/MysticalRay/hypo.rsi
    layers:
      - state: hypo
        map: ["enum.SolutionContainerLayers.Base"]
      - state: hypo_fill1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Item
    sprite: _DeadSpace/Sponsor/MysticalRay/hypo.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 5
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
    exactVolume: true
  - type: Injector
    solutionName: hypospray
    ignoreClosed: false
    activeModeProtoId: HyposprayDynamicMode
    allowedModes:
    - HyposprayDynamicMode
    - HyposprayInjectMode
  - type: UseDelay
    delay: 0.5
  - type: StaticPrice
    price: 750
  - type: StealTarget
    stealGroup: Hypospray
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 4
    fillBaseName: hypo_fill
    solutionName: hypospray

# instruments
# drill
- type: entity
  parent: BaseItem
  id: PowerDrillhent
  name: тактическая электродрель Мед-Техника
  description: Более компактная и также более эффективная вариация электродрели.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/MysticalRay/tools_powerdrill.rsi
    state: drill_screw
  - type: Item
    sprite: _DeadSpace/Sponsor/MysticalRay/tools_powerdrill.rsi
    size: Small
  - type: Tool
    qualities:
      - Screwing
    speedModifier: 1.5
    useSound: /Audio/Items/drill_use.ogg
  - type: MultipleTool
    statusShowBehavior: true
    entries:
      - behavior: Screwing
        sprite:
          sprite: _DeadSpace/Sponsor/MysticalRay/tools_powerdrill.rsi
          state: drill_screw
        useSound:
          path: /Audio/Items/drill_use.ogg
        changeSound:
          path: /Audio/Items/change_drill.ogg
      - behavior: Anchoring
        sprite:
          sprite: _DeadSpace/Sponsor/MysticalRay/tools_powerdrill.rsi
          state: drill_bolt
        useSound:
          path: /Audio/Items/drill_use.ogg
        changeSound:
          path: /Audio/Items/change_drill.ogg
  - type: PhysicalComposition
    materialComposition:
      Steel: 300
      Plastic: 100
  - type: StaticPrice
    price: 100
  - type: MeleeWeapon
    wideAnimationRotation: -90
    attackRate: 1.5
    damage:
      types:
        Piercing: 10
    soundHit:
      path: "/Audio/Items/drill_hit.ogg"

#JawsOfLife
- type: entity
  parent: JawsOfLife
  id: JawsOfLifehent
  name: тактические челюсти Мед-Техника
  description: Косметическая модификация челюстей жизни.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/MysticalRay/tools_jawsoflife.rsi
    state: syn_jaws_pry
  - type: Item
    inhandVisuals:
      left:
      - state: syn_inhand-left
      right:
      - state: syn_inhand-right
    size: Normal
  - type: MultipleTool
    entries:
      - behavior: Prying
        sprite:
          sprite: _DeadSpace/Sponsor/MysticalRay/tools_jawsoflife.rsi
          state: syn_jaws_pry
        useSound: /Audio/Items/jaws_pry.ogg
        changeSound: /Audio/Items/change_jaws.ogg
      - behavior: Cutting
        sprite:
          sprite: _DeadSpace/Sponsor/MysticalRay/tools_jawsoflife.rsi
          state: syn_jaws_cutter
        useSound: /Audio/Items/jaws_cut.ogg
        changeSound: /Audio/Items/change_jaws.ogg
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 14

