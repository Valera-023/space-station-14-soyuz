# Hardsuit
- type: entity
  parent: ClothingOuterHardsuitSecurity
  id: ClothingOuterHardsuithent
  name: скафандр Мед-Техника
  description: Скафандр с биокодированием, обеспечивающий защиту в критических ситуациях.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/Wisdom/hardsuit.rsi
  - type: Clothing
    sprite: _DeadSpace/Sponsor/Wisdom/hardsuit.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuithent
  - type: Item
    size: Huge
  - type: HardsuitIdentification
    nonlethal: true
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.5
        Slash: 0.5
        Piercing: 0.6
        Heat: 0.5
        Radiation: 0.5
        Caustic: 0.5
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag

- type: entity
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase, ShowMedicalIcons ]
  id: ClothingHeadHelmetHardsuithent
  categories: [ HideSpawnMenu ]
  name: шлем скафандра Мед-Техника
  description: Шлем с встроенным медицинским визором, который обеспечивает защиту и освещение для работы в темных условиях.
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/hent/helmet.rsi
  - type: Clothing
    sprite: _DeadSpace/Sponsor/hent/helmet.rsi
  - type: PointLight
    color: "#ebebeb"
  - type: PressureProtection
    highPressureMultiplier: 0.08
    lowPressureMultiplier: 1000
  - type: ShowHealthBars
    damageContainers:
    - Biological
    - Inorganic
    - Silicon
  - type: EyeProtection
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag

