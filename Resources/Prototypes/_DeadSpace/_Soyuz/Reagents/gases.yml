- type: reagent
  id: Nitryl
  name: reagent-name-nitryl
  desc: reagent-desc-nitryl
  physicalDesc: reagent-physical-desc-gaseous
  flavor: bitter
  color: "#9c6b3a"
  boilingPoint: 21.0
  meltingPoint: -11.0
  metabolisms:
    Gas:
      effects:
      - !type:HealthChange
        minScale: 0.3
        damage:
          types:
            Poison: 0.15
      - !type:Oxygenate
        minScale: 0.5
        factor: -0.5
      - !type:AdjustAlert
        alertType: Toxins
        minScale: 0.5
        clear: true
        time: 5

- type: reagent
  id: Fixirium
  name: reagent-name-fixirium
  desc: reagent-desc-fixirium
  physicalDesc: reagent-physical-desc-gaseous
  flavor: bitter
  color: "#d3d3d3"
  boilingPoint: -170.0
  meltingPoint: -210.0
  metabolisms:
    Gas:
      effects:
      - !type:Oxygenate
        factor: 8
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Human, Animal, Rat, Plant ]
      - !type:ModifyLungGas
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Vox ]
          inverted: true
        ratios:
          CarbonDioxide: 1.0
          Fixirium: -1.0
      - !type:HealthChange
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Vox ]
        damage:
          types:
            Poison: 0.7
      - !type:AdjustAlert
        alertType: Toxins
        minScale: 0.5
        clear: true
        time: 5
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Vox ]

