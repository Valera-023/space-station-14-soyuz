# Для удобства создал отдельный parent с измененным путём спрайта
- type: entity
  abstract: true
  parent: GasCanister
  id: GasCanisterSoyuz
  name: СОВЕТСКАЯ канистра кислорода
  description: Вы точно не должны видеть эту канистру.
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      sprite: _DeadSpace/_Soyuz/Structures/Storage/canisters.rsi
      noRot: true
      layers:
        - state: hydrogen
        - state: paper
          visible: false
          map: [ "enum.PaperLabelVisuals.Layer" ]
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 600
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 300
        behaviors:
        - !type:PlaySoundBehavior
          sound:
            collection: MetalBreak
        - !type:SpawnEntitiesBehavior
          spawn:
            WaterVaporCanisterBroken:
              min: 1
              max: 1
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
        - !type:DumpCanisterBehavior

- type: entity
  parent: GasCanisterSoyuz
  id: NitrylCanister
  name: канистра диоксида азота
  description: Канистра, в которой может содержаться газ любого вида. В этой, предположительно, содержится диоксид азота. Можно прикрепить к порту коннектора с помощью гаечного ключа.
  components:
    - type: Sprite
      layers:
        - state: nitryl
    - type: GasCanister
      gasMixture:
        volume: 1500
        moles:
          Nitryl: 2769.36
        temperature: 293.15

