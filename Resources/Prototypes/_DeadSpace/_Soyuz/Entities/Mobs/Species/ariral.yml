- type: entity
  save: false
  name: Urist McArir
  parent: BaseMobSpeciesOrganic
  id: BaseMobAriral
  abstract: true
  components:
  - type: Hunger
  - type: Icon # It will not have an icon in the adminspawn menu without this. Body parts seem fine for whatever reason.
    sprite: _DeadSpace/_Soyuz/Mobs/Species/Ariral/parts.rsi
    state: full
  - type: Thirst
  - type: Speech
    allowedEmotes: ["Meow", "Purr", "Hiss"]
  - type: Vocal
    sounds:
      Male: MaleHuman
      Female: FemaleHuman
      Unsexed: MaleHuman
  - type: InteractionPopup
    successChance: 0.1
    interactFailureString: petting-failure-ariral
    interactSuccessString: hugging-success-generic
    interactSuccessSound: /Audio/Effects/thudswoosh.ogg
    messagePerceivedByOthers: null
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatHuman
      amount: 5
  - type: Language
    selectedLanguage: GeneralLanguage
    knownLanguages:
    - GeneralLanguage
    - Ariral
  - type: Stamina # DS14: removed obsolete field critThreshold
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    angle: 30
    animation: WeaponArcFist
    attackRate: 1
    damage:
      types:
        Blunt: 3 # Less melee damage but they apply poison after two+ hits.
  - type: HumanoidAppearance
    species: Ariral
    hideLayersOnEquip:
    - Hair
    - HeadTop
    - Snout
    - Tail
  - type: Sprite
    scale: 1, 1.1
  - type: ShortWhitelist
    scale: 0.8
    density: 140
    pseudoItem: false
    cosmeticOnly: false
  - type: Inventory
    speciesId: reptilian # Reuse lizard displacements, especially for the feet.
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _DeadSpace/_Soyuz/Mobs/Species/displacement.rsi
            state: jumpsuit-female
      shoes:
        sizeMaps:
          32:
            sprite: _DeadSpace/_Soyuz/Mobs/Species/displacement.rsi
            state: shoes
      socks:
        sizeMaps:
          32:
            sprite: _DeadSpace/_Soyuz/Mobs/Species/displacement.rsi
            state: shoes
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _DeadSpace/_Soyuz/Mobs/Species/displacement.rsi
            state: jumpsuit
      shoes:
        sizeMaps:
          32:
            sprite: _DeadSpace/_Soyuz/Mobs/Species/displacement.rsi
            state: shoes
      socks:
        sizeMaps:
          32:
            sprite: _DeadSpace/_Soyuz/Mobs/Species/displacement.rsi
            state: shoes

