- type: entity
  parent: BaseItem
  id: USSPChatCartridge
  name: картридж «Редлайн»
  description: Компактный картридж защищённой локальной связи для настоящих товарищей.
  components:
  - type: Sprite
    sprite: _DeadSpace/_Soyuz/Objects/Devices/cartridge.rsi
    state: cart-redline
  - type: Icon
    sprite: _DeadSpace/_Soyuz/Objects/Devices/cartridge.rsi
    state: cart-redline
  - type: UIFragment
    ui: !type:USSPChatUi
  - type: Cartridge
    programName: ussp-chat-program-name
    icon:
      sprite: _DeadSpace/_Soyuz/Objects/Devices/cartridge.rsi
      state: cart-redline
  - type: USSPChatCartridge

- type: entity
  parent: BaseItem
  id: USSPMonitorCartridge
  name: "картридж «Редлайн: надзор»"
  description: Наблюдательный картридж защищённой локальной связи. Позволяет читать все переписки, но не отправлять сообщения.
  components:
  - type: Sprite
    sprite: _DeadSpace/_Soyuz/Objects/Devices/cartridge.rsi
    state: cart-redline-nadzor
  - type: Icon
    sprite: _DeadSpace/_Soyuz/Objects/Devices/cartridge.rsi
    state: cart-redline-nadzor
  - type: UIFragment
    ui: !type:USSPChatUi
  - type: Cartridge
    programName: ussp-monitor-program-name
    icon:
      sprite: _DeadSpace/_Soyuz/Objects/Devices/cartridge.rsi
      state: cart-redline-nadzor
  - type: USSPChatCartridge
    canSendMessages: false # DS-14
    canMonitorAllChats: true # DS-14
