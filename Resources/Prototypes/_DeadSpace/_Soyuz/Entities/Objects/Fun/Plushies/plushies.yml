- type: entity
  parent: BasePlushieDeadSpaceMisc
  id: BasePlushieSoyuz
  name: советская плюшка
  description: Вы явно не должны это видеть.
  categories: [ HideSpawnMenu ] 
  components:
  - type: Sprite
    sprite: _DeadSpace/_Soyuz/Fun/plushies.rsi
    state: hos1
  - type: UseDelay
    delay: 1.0
  - type: MeleeWeapon
    attackRate: 1.5

- type: entity
