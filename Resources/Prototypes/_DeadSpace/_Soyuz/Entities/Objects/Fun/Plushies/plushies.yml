    anchored: false
  - type: Sprite
    sprite: _DeadSpace/_Soyuz/Fun/plushies.rsi
    state: hos1
  - type: RandomSpawner
    offset: 0
    prototypes:
    - PlushieHoS1
    - PlushieCaptain1
    - PlushieCE1
    - PlushieDiona
    - PlushieHoP1
    - PlushieIPS1
    - PlushieJuggenraut1
    - PlushieOfficer1
    - PlushieOfficer2
    - PlushieOfficer3
    - PlushieOKGB1

