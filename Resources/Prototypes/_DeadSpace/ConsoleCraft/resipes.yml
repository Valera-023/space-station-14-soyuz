# Рамдомные чертежи при крафте
# Если вы хотите чтобы был рамдомный предмет во время крафта у чертежа, ставьте не requestItems, а randomRequestItems, а после чего составляйте список.

- type: consoleCraft
  id: WeaponRifleAEKCraft
  name: AEK
  item: WeaponRifleAEK
  time: 10
  randomRequestItems:
  - items:
      - ScrapFirelock3
      - MediumCoreForModifiedBackpack
    amount: 1
    label: "Металл (случайный)"
  minorItems:
  - EnhancedCoolingModule
  - OverchargeModule
  - MassSkope
