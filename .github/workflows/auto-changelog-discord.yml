name: "Changelog: Send discord webhook"

on:
  pull_request_target:
    types: [closed]

jobs:
  send-discord:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Extract PR details
        id: extract
        run: |
          BODY=$(printf '%s' "${{ github.event.pull_request.body }}" | base64 -w0)
          echo "DESCRIPTION_B64=$BODY" >> "$GITHUB_OUTPUT"
          echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          echo "REPO=${{ github.repository }}" >> "$GITHUB_OUTPUT"

      - name: Parse PR and format text
        id: parse_step
        env:
          DESCRIPTION_B64: ${{ steps.extract.outputs.DESCRIPTION_B64 }}
          PR_NUMBER: ${{ steps.extract.outputs.PR_NUMBER }}
          REPO: ${{ steps.extract.outputs.REPO }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          python Tools/pr_changelog.py render-discord \
            --body-base64 "$DESCRIPTION_B64" \
            --author "$AUTHOR" \
            --pr "$PR_NUMBER" \
            --repo "$REPO" \
            --output-file "discord_msg.txt"

          if [ -s "discord_msg.txt" ]; then
            echo "should_send=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_send=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send to Discord
        if: steps.parse_step.outputs.should_send == 'true'
        env:
          WEBHOOK_URL: ${{ secrets.CHANGELOG_DISCORD_WEBHOOK }}
        run: |
          MESSAGE_TEXT=$(cat discord_msg.txt)

          jq -n --arg msg "$MESSAGE_TEXT" '{
            "username": "Союз-1",
            "content": $msg,
            "allowed_mentions": { "parse": [] }
          }' | curl -X POST \
            -H "Content-Type: application/json" \
            -d @- \
            "$WEBHOOK_URL" \
            --fail \
            --silent
