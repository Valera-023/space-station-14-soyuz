name: "Changelog: Update changelog"

permissions:
  contents: write

on:
  pull_request_target:
    types: [closed]

jobs:
  changelog:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout changelog branch
        uses: actions/checkout@v4
        with:
          ref: changelog
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract PR description
        id: extract
        run: |
          BODY=$(printf '%s' "${{ github.event.pull_request.body }}" | base64 -w0)
          echo "DESCRIPTION_B64=$BODY" >> $GITHUB_OUTPUT

      - name: Update changelog from :cl:
        run: |
          python3 Tools/pr_changelog.py update-yaml \
            --body-base64 "${{ steps.extract.outputs.DESCRIPTION_B64 }}" \
            --author "${{ github.event.pull_request.user.login }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --time "${{ github.event.pull_request.merged_at }}" \
            --changelog-file Resources/Changelog/ChangelogDS14Soyuz.yml

      - name: Commit and push to changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Resources/Changelog/ChangelogDS14Soyuz.yml

          if git diff --cached --quiet; then
            echo "No changelog changes to commit"
            exit 0
          fi

          git commit -m "Changelog: PR #${{ github.event.pull_request.number }}"
          git pull --rebase origin changelog
          git push origin changelog
