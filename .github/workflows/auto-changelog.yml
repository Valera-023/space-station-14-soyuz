name: "Changelog: Update changelog"
permissions:
  contents: write

on:
  pull_request_target:
    types: [closed]

jobs:
  changelog:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout changelog branch
        uses: actions/checkout@v4
        with:
          ref: changelog
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout base branch tools
        uses: actions/checkout@v4
        with:
          path: source
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Extract PR description
        id: extract
        run: |
          BODY=$(printf '%s' "${{ github.event.pull_request.body }}" | base64 -w0)
          echo "DESCRIPTION_B64=$BODY" >> "$GITHUB_OUTPUT"

      - name: Parse PR description and update changelog
        env:
          DESCRIPTION_B64: ${{ steps.extract.outputs.DESCRIPTION_B64 }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python source/Tools/pr_changelog.py update-yaml \
            --body-base64 "$DESCRIPTION_B64" \
            --author "$AUTHOR" \
            --pr "$PR_NUMBER" \
            --time "$(date -u --iso-8601=seconds)" \
            --changelog-file "Resources/Changelog/ChangelogDS14Soyuz.yml"

      - name: Commit and push to changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Resources/Changelog/ChangelogDS14Soyuz.yml"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Changelog: PR #${{ github.event.pull_request.number }}"

          max_retries=3
          retry_count=0
          until git pull --rebase origin changelog; do
            retry_count=$((retry_count + 1))
            if [ $retry_count -ge $max_retries ]; then
              echo "Failed to rebase after $max_retries attempts"
              exit 1
            fi
            echo "Rebase failed, retrying in 5 seconds..."
            sleep 5
          done

          git push origin changelog
