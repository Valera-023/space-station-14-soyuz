name: PR Before/After

on:
  # DS14-start: run preview only after RSI validation has actually been started for a pull request.
  workflow_run:
    workflows:
      - RSI Validator
    types:
      - completed
  # DS14-end
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  preview:
    name: Build Preview
    runs-on: ubuntu-latest
    # DS14: only react to successful pull_request RSI validation runs.
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request')
    steps:
      - name: Resolve PR context
        if: github.event_name == 'workflow_run'
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const prRef = run.pull_requests?.[0];
            if (!prRef) {
              core.setFailed('No pull request is associated with this RSI Validator run.');
              return;
            }

            const { owner, repo } = context.repo;
            const { data: pull } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prRef.number,
            });

            core.setOutput('number', String(pull.number));
            core.setOutput('base_sha', pull.base.sha);
            core.setOutput('head_sha', run.head_sha);
            core.setOutput('head_clone_url', pull.head.repo.clone_url);
            core.setOutput('is_latest', String(pull.head.sha === run.head_sha));
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pull.number,
              per_page: 100,
            });
            const fileNames = files.map(file => file.filename);
            core.setOutput('files_json', JSON.stringify(fileNames));

      - name: Checkout base repository
        if: github.event_name != 'workflow_run' || steps.pr.outputs.is_latest == 'true'
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Fetch PR head commit
        if: github.event_name == 'workflow_run' && steps.pr.outputs.is_latest == 'true'
        run: |
          git fetch --no-tags "${{ steps.pr.outputs.head_clone_url }}" "${{ steps.pr.outputs.head_sha }}"

      - name: Resolve comparison base
        if: github.event_name != 'workflow_run' || steps.pr.outputs.is_latest == 'true'
        id: compare_base
        env:
          BASE_SHA: ${{ github.event_name == 'workflow_run' && steps.pr.outputs.base_sha || github.sha }}
          HEAD_SHA: ${{ github.event_name == 'workflow_run' && steps.pr.outputs.head_sha || github.sha }}
        run: |
          COMPARE_BASE_SHA="$(git merge-base "$BASE_SHA" "$HEAD_SHA")"
          echo "base_sha=$COMPARE_BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        if: github.event_name != 'workflow_run' || steps.pr.outputs.is_latest == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: github.event_name != 'workflow_run' || steps.pr.outputs.is_latest == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow

      - name: Render preview image
        if: github.event_name != 'workflow_run' || steps.pr.outputs.is_latest == 'true'
        id: render
        env:
          BASE_SHA: ${{ steps.compare_base.outputs.base_sha }}
          HEAD_SHA: ${{ steps.compare_base.outputs.head_sha }}
          PR_FILES_JSON: ${{ github.event_name == 'workflow_run' && steps.pr.outputs.files_json || '' }}
        run: |
          mkdir -p .artifacts
          if [ -n "$PR_FILES_JSON" ]; then
            printf '%s' "$PR_FILES_JSON" > .artifacts/pr-files.json
            PR_FILES_ARG="--changed-paths-file .artifacts/pr-files.json"
          else
            PR_FILES_ARG=""
          fi
          python Tools/pr_before_after.py \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            $PR_FILES_ARG \
            --output .artifacts/pr-before-after.png \
            --metadata .artifacts/pr-before-after.json
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        if: github.event_name != 'workflow_run' || steps.pr.outputs.is_latest == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pr-before-after
          path: |
            .artifacts/pr-before-after.png
            .artifacts/pr-before-after.json

      - name: Publish preview image to preview branch
        if: github.event_name == 'workflow_run' && steps.pr.outputs.is_latest == 'true'
        id: publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ steps.render.outputs.head_sha }}
        run: |
          set -euo pipefail
          BRANCH="pr-preview-artifacts"
          IMAGE_PATH="pr/${PR_NUMBER}/before-after.png"
          TMP_DIR="$(mktemp -d)"
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git"

          git init "$TMP_DIR"
          cd "$TMP_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "$REMOTE_URL"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -b "$BRANCH" "origin/$BRANCH"
          else
            git checkout --orphan "$BRANCH"
            git commit --allow-empty -m "Initialize preview branch"
            git push origin "$BRANCH"
          fi

          mkdir -p "$(dirname "$IMAGE_PATH")"
          cp "$GITHUB_WORKSPACE/.artifacts/pr-before-after.png" "$IMAGE_PATH"
          git add "$IMAGE_PATH"

          if ! git diff --cached --quiet; then
            git commit -m "Update PR #${PR_NUMBER} before/after"
            git push origin "$BRANCH"
          fi

          RAW_URL="https://raw.githubusercontent.com/${REPOSITORY}/${BRANCH}/${IMAGE_PATH}?sha=${HEAD_SHA}"
          echo "image_url=$RAW_URL" >> "$GITHUB_OUTPUT"

      - name: Find first preview comment
        if: github.event_name == 'workflow_run' && steps.pr.outputs.is_latest == 'true'
        id: find_comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          COMMENT_ID="$(gh api --paginate --slurp "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" --jq 'add | map(select(.user.login == "github-actions[bot]" and ((.body | contains("<!-- pr-before-after-comment -->")) or (.body | contains("### Before/After"))))) | sort_by(.created_at) | .[0].id // empty')"
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Create or update preview comment
        if: github.event_name == 'workflow_run' && steps.pr.outputs.is_latest == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          comment-id: ${{ steps.find_comment.outputs.comment_id }}
          edit-mode: replace
          body: |
            <!-- pr-before-after-comment -->
            ### Before/After
            Compared `${{ steps.render.outputs.base_sha }}` -> `${{ steps.render.outputs.head_sha }}`.

            ![PR before/after](${{ steps.publish.outputs.image_url }})

            [Open full-size image](${{ steps.publish.outputs.image_url }})
